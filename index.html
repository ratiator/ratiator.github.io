<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ratiator.github.io</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:           #f5f4f0;
  --bg2:          #eceae4;
  --bg3:          #e2e0d8;
  --white:        #ffffff;
  --border:       #d8d5cc;
  --border2:      #c8c4ba;
  --text:         #1a1916;
  --text2:        #6b6860;
  --text3:        #9c9a94;
  --accent:       #e85d26;
  --accent2:      #f07040;
  --accent-light: #fff0ea;
  --accent-dark:  #c04a1a;
  --green:        #2d7a4a;
  --green-light:  #eaf4ee;
  --gold:         #b8860b;
  --gold-light:   #fdf6e3;
  --purple:       #7030b0;
  --purple-light: #f8f0ff;
  --red:          #c03030;
  --red-light:    #fff0f0;
  --shadow-xs:    0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
  --shadow-xl:    0 16px 48px rgba(0,0,0,0.14), 0 8px 16px rgba(0,0,0,0.08);
  --radius:       12px;
  --radius-sm:    8px;
  --radius-xs:    5px;
}

/* ══════════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════════ */
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#app {
  display: grid;
  grid-template-columns: 320px 1fr 290px;
  grid-template-rows: 52px 1fr 28px;
  height: 100vh;
}

/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
header {
  grid-column: 1 / -1;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.logo-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.5); opacity: 0.6; }
}

.header-stats {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 20px;
}

.h-stat {
  text-align: right;
}

.h-stat-val {
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  line-height: 1.2;
}

.h-stat-label {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

/* Golden active banner in header */
#golden-banner {
  display: none;
  background: linear-gradient(90deg, var(--gold-light), #fff8dc, var(--gold-light));
  border: 1px solid var(--gold);
  border-radius: var(--radius-xs);
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  animation: shimmer-gold 2s linear infinite;
  background-size: 200% 100%;
}

#golden-banner.show { display: block; }

@keyframes shimmer-gold {
  0%   { background-position: 200% center; }
  100% { background-position: -200% center; }
}

.header-btns {
  display: flex;
  gap: 5px;
  margin-left: 12px;
}

.hbtn {
  padding: 4px 11px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.hbtn:hover {
  background: var(--bg2);
  border-color: var(--text3);
  color: var(--text);
}

.hbtn.danger:hover {
  background: var(--red-light);
  border-color: var(--red);
  color: var(--red);
}

/* ══════════════════════════════════════════════════════
   LEFT PANEL
══════════════════════════════════════════════════════ */
#left {
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 12px;
  gap: 16px;
  overflow: hidden;
}

/* Heat counter */
#heat-display {
  text-align: center;
  width: 100%;
}

#heat-num {
  font-size: 34px;
  font-weight: 300;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  letter-spacing: -1.5px;
  line-height: 1;
  transition: color 0.3s;
}

#heat-num.boosted { color: var(--gold); }

#heat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
  margin-top: 4px;
}

#heat-sub {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
  font-family: 'DM Mono', monospace;
  display: flex;
  justify-content: center;
  gap: 14px;
}

#heat-sub .val { color: var(--accent); font-weight: 500; }

/* Radiator click area */
#rad-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  cursor: pointer;
  position: relative;
  border-radius: var(--radius);
  background: var(--bg);
  transition: background 0.18s;
  user-select: none;
  overflow: hidden;
}

#rad-area:hover  { background: var(--bg2); }
#rad-area:active { background: var(--bg3); }

/* Heat ripple on click */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,93,38,0.18) 0%, transparent 70%);
  transform: scale(0);
  animation: ripple-out 0.6s ease-out forwards;
  pointer-events: none;
}

@keyframes ripple-out {
  to { transform: scale(4); opacity: 0; }
}

#radiator-svg {
  width: 155px;
  height: 195px;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.10)) drop-shadow(0 2px 6px rgba(0,0,0,0.07));
  transition: transform 0.08s ease, filter 0.4s;
  flex-shrink: 0;
}

#rad-area:active #radiator-svg {
  transform: scale(0.96) translateY(3px);
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.09));
}

#radiator-svg.warm {
  filter: drop-shadow(0 8px 24px rgba(232,93,38,0.15)) drop-shadow(0 2px 6px rgba(0,0,0,0.07));
}

#radiator-svg.hot {
  filter: drop-shadow(0 8px 30px rgba(232,93,38,0.35)) drop-shadow(0 2px 8px rgba(200,80,20,0.2));
}

#radiator-svg.blazing {
  filter: drop-shadow(0 0 40px rgba(255,120,30,0.55)) drop-shadow(0 4px 12px rgba(200,60,0,0.3));
}

#click-hint {
  margin-top: 8px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

/* Floating click text */
.float-text {
  position: fixed;
  pointer-events: none;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--accent);
  animation: floatUp 1.1s ease-out forwards;
  z-index: 9999;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(255,255,255,0.8);
}

.float-text.big   { font-size: 20px; color: var(--gold); }
.float-text.small { font-size: 13px; }
.float-text.normal{ font-size: 16px; }

@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  20%  { opacity: 1; transform: translateY(-12px) scale(1.05); }
  100% { opacity: 0; transform: translateY(-70px) scale(0.75); }
}

/* Combo display */
#combo-wrap {
  position: absolute;
  top: 10px;
  right: 10px;
  text-align: right;
  pointer-events: none;
}

#combo-num {
  font-size: 28px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 2px 8px rgba(232,93,38,0.25);
  display: none;
}

#combo-label {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Milestones / flavour message */
#flavour {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border-radius: var(--radius-xs);
  font-size: 11px;
  color: var(--text2);
  font-style: italic;
  text-align: center;
  line-height: 1.4;
  min-height: 38px;
  transition: color 0.3s;
}

#flavour.flash { color: var(--accent); font-style: normal; font-weight: 500; }

/* Prestige area */
#prestige-wrap {
  width: 100%;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#prestige-info {
  font-size: 10px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
  text-align: center;
}

#prestige-btn {
  width: 100%;
  padding: 7px;
  background: linear-gradient(135deg, var(--purple-light), #ece0ff);
  border: 1px solid #c8a0ee;
  border-radius: var(--radius-xs);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--purple);
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  letter-spacing: 0.2px;
}

#prestige-btn:hover {
  background: linear-gradient(135deg, #ede0ff, #e0d0ff);
  box-shadow: 0 2px 12px rgba(140, 60, 220, 0.2);
}

#prestige-btn.show { display: block; }

/* ══════════════════════════════════════════════════════
   MIDDLE PANEL
══════════════════════════════════════════════════════ */
#mid {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.panel-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
}

.ptab {
  padding: 14px 14px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  position: relative;
  white-space: nowrap;
}

.ptab:hover  { color: var(--text); }
.ptab.active { color: var(--accent); border-bottom-color: var(--accent); }

.ptab .badge {
  position: absolute;
  top: 6px;
  right: 2px;
  background: var(--accent);
  color: white;
  font-size: 8px;
  min-width: 14px;
  height: 14px;
  border-radius: 7px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
}

.ptab .badge.show { display: flex; }

#panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#panel-content::-webkit-scrollbar       { width: 4px; }
#panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Section labels */
.section-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
  margin-bottom: 8px;
  margin-top: 18px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.section-label:first-child { margin-top: 0; }
.section-label .count { color: var(--accent); margin-left: 4px; }

/* Upgrade grid */
.upgrade-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 7px;
  margin-bottom: 4px;
}

.upgrade-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  cursor: pointer;
  transition: all 0.14s;
  display: flex;
  align-items: flex-start;
  gap: 9px;
}

.upgrade-card:hover {
  border-color: var(--accent2);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.upgrade-card.affordable {
  border-color: var(--accent);
  background: var(--accent-light);
}

.upgrade-card.affordable:hover {
  box-shadow: 0 4px 16px rgba(232,93,38,0.18);
  transform: translateY(-2px);
}

.upgrade-card.bought {
  opacity: 0.4;
  cursor: default;
}

.upgrade-card.bought:hover {
  transform: none;
  border-color: var(--border);
  box-shadow: none;
}

.upgrade-card.locked {
  opacity: 0.35;
  cursor: default;
  filter: grayscale(0.4);
}

.upgrade-card.locked:hover {
  transform: none;
  border-color: var(--border);
  box-shadow: none;
}

.ug-icon {
  font-size: 21px;
  flex-shrink: 0;
  line-height: 1;
  margin-top: 1px;
}

.ug-body {
  flex: 1;
  min-width: 0;
}

.ug-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.3;
}

.ug-effect {
  font-size: 10px;
  color: var(--text2);
  line-height: 1.4;
}

.ug-cost {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 500;
  margin-top: 5px;
}

.ug-cost.cant-afford { color: var(--text3); }

.ug-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  margin-top: 5px;
}

.ug-tag.bought-tag { background: var(--green-light); color: var(--green); }
.ug-tag.locked-tag { background: var(--bg2); color: var(--text3); }

/* ══════════════════════════════════════════════════════
   ACHIEVEMENTS
══════════════════════════════════════════════════════ */
.ach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 7px;
}

.ach-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: all 0.14s;
}

.ach-card.earned {
  border-color: var(--gold);
  background: var(--gold-light);
}

.ach-card.locked {
  opacity: 0.38;
  filter: grayscale(0.5);
}

.ach-icon { font-size: 20px; flex-shrink: 0; }

.ach-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.ach-desc {
  font-size: 10px;
  color: var(--text2);
  margin-top: 2px;
  line-height: 1.4;
}

/* ══════════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}

.stat-card.full { grid-column: 1 / -1; }

.stat-card-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
  margin-bottom: 10px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 11px;
}

.stat-row + .stat-row { border-top: 1px solid var(--bg2); }

.s-label { color: var(--text2); }
.s-val   { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text); font-weight: 500; text-align: right; }

/* Heat bar at very bottom of stats */
.heat-progress-wrap {
  margin-top: 8px;
  background: var(--bg2);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
}

.heat-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dark), var(--accent2));
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* ══════════════════════════════════════════════════════
   RIGHT PANEL — BUILDINGS
══════════════════════════════════════════════════════ */
#right {
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.right-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
}

.right-hps-total {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 500;
}

.bulk-row {
  display: flex;
  gap: 4px;
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.bulk-btn {
  flex: 1;
  padding: 4px 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.2px;
}

.bulk-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--text3); }
.bulk-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

#buildings-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#buildings-list::-webkit-scrollbar       { width: 3px; }
#buildings-list::-webkit-scrollbar-thumb { background: var(--border); }

.building-row {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid var(--bg2);
  gap: 9px;
  position: relative;
}

.building-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: transparent;
  transition: background 0.15s;
}

.building-row.affordable::before { background: var(--accent); }

.building-row:hover            { background: var(--bg); }
.building-row.affordable:hover { background: var(--accent-light); }

.b-icon {
  font-size: 18px;
  flex-shrink: 0;
  width: 26px;
  text-align: center;
}

.b-info   { flex: 1; min-width: 0; }

.b-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.b-hps {
  font-size: 9px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-top: 1px;
}

.b-right       { text-align: right; flex-shrink: 0; }

.b-cost-tag {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 600;
  line-height: 1.2;
}

.b-cost-tag.cant { color: var(--text3); }

.b-owned-num {
  font-size: 22px;
  font-weight: 300;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  line-height: 1;
}

.b-owned-num.has { color: var(--text); font-weight: 500; }

/* Milestone badges on buildings */
.b-milestone {
  font-size: 8px;
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  margin-top: 1px;
}

/* ══════════════════════════════════════════════════════
   BOTTOM BAR (news ticker)
══════════════════════════════════════════════════════ */
#bottom-bar {
  grid-column: 1 / -1;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
}

#ticker-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

.ticker-track {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.ticker-inner {

  font-size: 10px;
  color: var(--text3);
  font-style: italic;

  0%   { transform: translateX(100vw); }
  100% { transform: translateX(-100%); }

/* ══════════════════════════════════════════════════════

══════════════════════════════════════════════════════ */
#golden {
  position: fixed;
  cursor: pointer;
  z-index: 500;
  display: none;
  font-size: 38px;
  filter: drop-shadow(0 0 18px rgba(255, 200, 50, 0.8)) drop-shadow(0 0 6px rgba(255,160,0,0.5));
  transition: transform 0.1s;
}

#golden:hover { transform: scale(1.15) rotate(8deg); }

@keyframes goldenBob {
  0%   { opacity: 0; transform: scale(0.4) rotate(-15deg); }
  10%  { opacity: 1; transform: scale(1.12) rotate(4deg); }
  50%  { transform: scale(1.05) rotate(-3deg); }
  90%  { opacity: 1; transform: scale(1) rotate(2deg); }
  100% { opacity: 0; transform: scale(0.8) rotate(10deg); }
}

/* ══════════════════════════════════════════════════════
   TOASTS
══════════════════════════════════════════════════════ */
#toasts {
  position: fixed;
  top: 62px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 9000;
  pointer-events: none;
}

.toast {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  box-shadow: var(--shadow-md);
  animation: toastIn 0.22s ease, toastOut 0.22s ease 2.78s forwards;
  min-width: 210px;
  max-width: 320px;
  line-height: 1.4;
}

.toast.gold   { border-left-color: var(--gold); }
.toast.green  { border-left-color: var(--green); }
.toast.purple { border-left-color: var(--purple); }
.toast.big    { font-size: 13px; padding: 12px 16px; }

@keyframes toastIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { to   { opacity:0; transform:translateX(20px); } }

/* ══════════════════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════════════════ */
#tooltip {
  position: fixed;
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  max-width: 230px;
  pointer-events: none;
  z-index: 10000;
  display: none;
  box-shadow: var(--shadow-xl);
}

#tooltip.show { display: block; }

.tt-name   { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.tt-cost   { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); margin-bottom: 5px; font-weight: 500; }
.tt-body   { font-size: 11px; color: var(--text2); line-height: 1.5; font-style: italic; }
.tt-effect { font-size: 10px; color: var(--green); margin-top: 6px; font-weight: 600; padding-top: 5px; border-top: 1px solid var(--border); }

/* ══════════════════════════════════════════════════════
   MISC
══════════════════════════════════════════════════════ */
.empty {
  text-align: center;
  padding: 36px 16px;
  color: var(--text3);
  font-size: 12px;
  line-height: 1.7;
  font-style: italic;
}

/* Particle burst */
.particle {
  position: fixed;
  pointer-events: none;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: particlePop 0.7s ease-out forwards;
  z-index: 9998;

@keyframes particlePop {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }

function calcHPS() {
  let gMult = 1;
  const bM  = {};
  BUILDINGS.forEach(b => bM[b.id] = 1);

  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (!u) return;
    if (u.type === 'global')    gMult *= u.mult;
    if (u.type === 'building')  bM[u.target] = (bM[u.target] || 1) * u.mult;
  });

  let hps = 0;
  BUILDINGS.forEach(b => {
    hps += (G.b[b.id] || 0) * b.baseHPS * (bM[b.id] || 1);
  });

  return hps * gMult * (1 + G.prestige * 0.1);
}

function calcCPC() {
  let cp = 1;
  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (u && u.type === 'click') cp *= u.mult;
  });
  cp += calcHPS() * 0.015;
  cp *= (1 + G.prestige * 0.05);
  if (G.comboClicks >= 5) cp *= (1 + G.comboClicks * 0.03);
  return Math.max(1, cp);
}

function calcBuildingHPS(b) {
  let mult = 1;
  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (!u) return;
    if (u.type === 'building' && u.target === b.id) mult *= u.mult;
    if (u.type === 'global') mult *= u.mult;
  });
  return b.baseHPS * mult * (1 + G.prestige * 0.1);
}

function buildingCost(b, count, owned) {
  let t = 0;
  const base = b.baseCost;
  for (let i = 0; i < count; i++) {
    t += Math.ceil(base * Math.pow(1.15, owned + i));
  }
  return t;
}

function maxBuyable(b) {
  let n = 0, total = 0;
  const owned = G.b[b.id] || 0;
  while (true) {
    const next = Math.ceil(b.baseCost * Math.pow(1.15, owned + n));
    if (total + next > G.heat) break;
    total += next;
    n++;
    if (n > 9999) break;
  }
  return n;
}

function totalB() {
  return Object.values(G.b).reduce((a, x) => a + x, 0);
}

function upgCost(u) {
  return typeof u.cost === 'string' ? parseInt(u.cost) : u.cost;
}

// ════════════════════════════════════════════════════════
//  FORMATTING
// ════════════════════════════════════════════════════════
function fmt(n) {
  if (n < 1000) return Math.floor(n).toLocaleString();
  const suf  = ['','k','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
  const tier = Math.min(Math.floor(Math.log10(Math.abs(n)) / 3), suf.length - 1);
  const s    = n / Math.pow(1000, tier);
  return (s >= 100 ? s.toFixed(1) : s >= 10 ? s.toFixed(2) : s.toFixed(3))
    .replace(/\.?0+$/, '') + suf[tier];
}

function fmtFull(n) {
  if (n < 1e6) return Math.floor(n).toLocaleString();
  return fmt(n);
}

function fmtTime(s) {
  s = Math.floor(s);
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

// ════════════════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════════════════
function tick() {
  const now = Date.now();
  const dt  = Math.min((now - lastTick) / 1000, 0.5);
  lastTick  = now;

  const hps  = calcHPS();
  const earn = hps * dt * G.goldenMult;

  G.heat      += earn;
  G.totalHeat += earn;
  G.timePlayed += dt;

  if (hps > G.highHPS) G.highHPS = hps;

  // Idle heat tracking
  if (now - lastClickForIdle > 3000) {
    G.idleHeat  += earn;
    G.idleTimer += dt;
  }

  // Golden boost countdown
  if (G.goldenMult > 1) {
    G.goldenTimer -= dt;
    const banner = document.getElementById('golden-banner');
    document.getElementById('golden-countdown').textContent = Math.ceil(G.goldenTimer);
    if (G.goldenTimer <= 0) {
      G.goldenMult = 1;
      banner.classList.remove('show');
      toast('Golden boost faded. Back to normal tugging.');
    }
  }

  // Combo decay
  if (now - G.lastClickTime > 600 && G.comboClicks > 0) {
    G.comboClicks = 0;
    document.getElementById('combo-num').style.display = 'none';
    document.getElementById('combo-label').textContent = '';
  }

  goldenCooldown -= dt;
  if (goldenCooldown <= 0) spawnGolden();

  updateUI(hps);
  checkAchievements();
  updateFlavour();
}

setInterval(tick, 1000 / 30);
setInterval(() => saveGame(true), 30000);

// ════════════════════════════════════════════════════════
//  CLICKING THE RADIATOR
// ════════════════════════════════════════════════════════
function clickRadiator(e) {
  const now = Date.now();
  lastClickForIdle = now;

  // Combo
  if (now - G.lastClickTime < 550) {
    G.comboClicks++;
  } else {
    G.comboClicks = 1;
  }
  G.lastClickTime = now;
  if (G.comboClicks > G.bestCombo) G.bestCombo = G.comboClicks;

  const cnum = document.getElementById('combo-num');
  if (G.comboClicks >= 5) {
    cnum.style.display = 'block';
    cnum.textContent = '×' + G.comboClicks;
    document.getElementById('combo-label').textContent = 'COMBO';
  } else {
    cnum.style.display = 'none';
    document.getElementById('combo-label').textContent = '';
  }

  const cp = calcCPC() * G.goldenMult;
  G.heat      += cp;
  G.totalHeat += cp;
  G.clicks++;

  // Heat shimmer
  const shimmer = document.getElementById('heat-shimmer');
  shimmer.style.opacity = '1';
  setTimeout(() => { shimmer.style.opacity = '0'; }, 350);

  // Float text
  const size = cp > 1000 ? 'big' : cp > 100 ? 'normal' : 'small';
  spawnFloat('+' + fmt(cp), e.clientX - 16, e.clientY - 10, size);

  // Particles
  if (G.comboClicks >= 5) {
    for (let i = 0; i < 6; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = Math.random() * Math.PI * 2;
      const dist  = 30 + Math.random() * 60;
      p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
      p.style.setProperty('--dy', (Math.sin(angle) * dist - 20) + 'px');
      p.style.left = e.clientX + 'px';
      p.style.top  = e.clientY + 'px';
      p.style.background = G.comboClicks >= 20 ? 'var(--gold)' : 'var(--accent)';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 750);
    }
  }

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const rect = document.getElementById('rad-area').getBoundingClientRect();
  const size2 = Math.max(rect.width, rect.height);
  ripple.style.width  = size2 + 'px';
  ripple.style.height = size2 + 'px';
  ripple.style.left   = (e.clientX - rect.left - size2/2) + 'px';
  ripple.style.top    = (e.clientY - rect.top  - size2/2) + 'px';
  document.getElementById('rad-area').appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}

function spawnFloat(text, x, y, cls = 'normal') {
  const ft = document.createElement('div');
  ft.className = 'float-text ' + cls;
  ft.textContent = text;
  ft.style.left = x + 'px';
  ft.style.top  = y + 'px';
  document.body.appendChild(ft);
  setTimeout(() => ft.remove(), 1100);
}

// ════════════════════════════════════════════════════════
//  BUILDINGS
// ════════════════════════════════════════════════════════
function buyBuilding(b) {
  let count = G.bulkBuy === 0 ? Math.max(1, maxBuyable(b)) : G.bulkBuy;
  const owned = G.b[b.id] || 0;
  let cost = buildingCost(b, count, owned);

  if (G.heat < cost) {
    if (count === 1) return;
    const c1 = buildingCost(b, 1, owned);
    if (G.heat < c1) return;
    count = 1;
    cost  = c1;
  }
  if (G.heat < cost) return;

  G.heat       -= cost;
  G.b[b.id]     = owned + count;

  renderBuildings();
  if (currentTab === 'upgrades') renderTab();
}

function setBulk(n) {
  G.bulkBuy = n;
  ['b1','b10','b100','bmax'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(n === 0 ? 'bmax' : 'b' + n).classList.add('active');
  renderBuildings();
}

function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  const hps = calcHPS();
  document.getElementById('right-hps-total').textContent = fmt(hps) + '/s';

  BUILDINGS.forEach(b => {
    const owned    = G.b[b.id] || 0;
    const count    = G.bulkBuy === 0 ? Math.max(1, maxBuyable(b)) : G.bulkBuy;
    const cost     = buildingCost(b, count, owned);
    const canAfford = G.heat >= cost;
    const bHPS     = calcBuildingHPS(b);
    const countLbl = G.bulkBuy === 0 ? `×${Math.max(1, maxBuyable(b))}` :
                     G.bulkBuy > 1   ? `×${G.bulkBuy}` : '';

    // milestone star at 10, 25, 50, 100, 200
    const milestones = [10, 25, 50, 100, 200];
    let nextMilestone = milestones.find(m => owned < m);
    const milestoneTxt = nextMilestone
      ? `Next milestone: ${nextMilestone} (${nextMilestone - owned} away)`
      : '★ Max milestone reached';

    const row = document.createElement('div');
    row.className = 'building-row' + (canAfford ? ' affordable' : '');
    row.innerHTML = `
      <div class="b-icon">${b.icon}</div>
      <div class="b-info">
        <div class="b-name">${b.name}</div>
        <div class="b-hps">${owned > 0 ? fmt(bHPS * owned) + '/s total' : '—'}</div>
        <div class="b-milestone">${milestoneTxt}</div>
      </div>
      <div class="b-right">
        <div class="b-cost-tag ${canAfford ? '' : 'cant'}">${fmt(cost)} ${countLbl}</div>
        <div class="b-owned-num ${owned > 0 ? 'has' : ''}">${owned}</div>
      </div>
    `;

    row.addEventListener('click', () => buyBuilding(b));
    row.addEventListener('mouseenter', ev => showTT(ev, {
      name:   b.name,
      cost:   fmtFull(cost) + ' heat',
      body:   b.desc,
      effect: owned > 0
        ? `${owned} owned · ${fmt(bHPS * owned)}/s total · ${fmt(bHPS)}/s each`
        : `Each produces ${fmt(bHPS)}/s`,
    }));
    row.addEventListener('mouseleave', hideTT);
    row.addEventListener('mousemove',  moveTT);
    list.appendChild(row);
  });
}

// ════════════════════════════════════════════════════════
//  UPGRADES
// ════════════════════════════════════════════════════════
function buyUpgrade(u) {
  if (G.upgrades.includes(u.id)) return;
  const cost = upgCost(u);
  if (G.heat < cost) return;
  G.heat -= cost;
  G.upgrades.push(u.id);
  G.upgradesBought++;

  const hpsBefore = calcHPS();
  renderTab();
  renderBuildings();
  const hpsAfter  = calcHPS();
  const hpsDiff   = hpsAfter - hpsBefore;

  let msg = `🔧 ${u.name} — ${u.effect}`;
  if (hpsDiff > 0.5) msg += `  (+${fmt(hpsDiff)}/s)`;
  toast(msg, 'big');
}

function renderUpgrades() {
  const avail    = UPGRADES.filter(u => !G.upgrades.includes(u.id) && u.req());
  const bought   = UPGRADES.filter(u =>  G.upgrades.includes(u.id));
  const locked   = UPGRADES.filter(u => !G.upgrades.includes(u.id) && !u.req());
  const affordable = avail.filter(u => G.heat >= upgCost(u)).length;

  const badge = document.getElementById('badge-upg');
  if (affordable > 0) {
    badge.textContent = affordable;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  let html = '';
  if (avail.length === 0 && bought.length === 0) {
    html = '<div class="empty">Generate more heat to unlock upgrades.<br>Click the radiator, mush.</div>';
  } else {
    if (avail.length > 0) {
      html += `<div class="section-label">Available <span class="count">${avail.length}</span></div>`;
      html += '<div class="upgrade-grid" id="ug-avail"></div>';
    }
    if (locked.length > 0) {
      html += `<div class="section-label">Locked <span class="count">${locked.length}</span></div>`;
      html += '<div class="upgrade-grid" id="ug-locked"></div>';
    }
    if (bought.length > 0) {
      html += `<div class="section-label">Purchased <span class="count">${bought.length}</span></div>`;
      html += '<div class="upgrade-grid" id="ug-bought"></div>';
    }
  }

  document.getElementById('panel-content').innerHTML = html;

  function makeCard(u, state) {
    const cost = upgCost(u);
    const canAfford = G.heat >= cost;
    const card = document.createElement('div');
    card.className = 'upgrade-card ' + state + (state === 'available' && canAfford ? ' affordable' : '');
    let bottomTag = '';
    if (state === 'bought')  bottomTag = '<div class="ug-tag bought-tag">✓ Purchased</div>';
    if (state === 'locked')  bottomTag = '<div class="ug-tag locked-tag">🔒 Locked</div>';
    if (state === 'available') bottomTag = `<div class="ug-cost ${canAfford ? '' : 'cant-afford'}">🔥 ${fmtFull(cost)}</div>`;

    card.innerHTML = `
      <div class="ug-icon">${u.icon}</div>
      <div class="ug-body">
        <div class="ug-name">${u.name}</div>
        <div class="ug-effect">${u.effect}</div>
        ${bottomTag}
      </div>`;

    if (state === 'available') {
      card.addEventListener('click', () => buyUpgrade(u));
    }
    card.addEventListener('mouseenter', ev => showTT(ev, {
      name:   u.name,
      cost:   state === 'bought' ? 'Purchased' : fmtFull(cost) + ' heat',
      body:   u.desc,
      effect: u.effect,
    }));
    card.addEventListener('mouseleave', hideTT);
    card.addEventListener('mousemove',  moveTT);
    return card;
  }

  if (avail.length  > 0) { const g = document.getElementById('ug-avail');  avail.forEach(u  => g.appendChild(makeCard(u, 'available'))); }
  if (locked.length > 0) { const g = document.getElementById('ug-locked'); locked.forEach(u => g.appendChild(makeCard(u, 'locked'))); }
  if (bought.length > 0) { const g = document.getElementById('ug-bought'); bought.forEach(u => g.appendChild(makeCard(u, 'bought'))); }
}

function checkAchievements() {
  let newOnes = 0;
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievements.includes(a.id) && a.req()) {
      G.achievements.push(a.id);
      toast('🏆 Achievement: ' + a.name, 'green');
      newOnes++;

  if (newOnes > 0 && currentTab === 'achievements') renderTab();
}

// ════════════════════════════════════════════════════════
function renderMilestones() {
  const hps = calcHPS();
  function milestoneVal(m) {
    switch (m.type) {
      case 'heat':      return G.totalHeat;
      case 'buildings': return totalB();
      case 'clicks':    return G.clicks;
      case 'upgrades':  return G.upgradesBought;
      case 'hps':       return hps;
      case 'prestige':  return G.prestige;
    }
    return 0;
  }

  let html = `<div class="section-label">Progress Milestones</div>`;
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';

  MILESTONES.forEach(m => {
    const val     = milestoneVal(m);
    const done    = val >= m.target;
    const pct     = Math.min(100, (val / m.target) * 100);
    const valDisp = m.type === 'heat' || m.type === 'hps' ? fmt(val) : Math.floor(val).toLocaleString();
    const tgtDisp = m.type === 'heat' || m.type === 'hps' ? fmt(m.target) : m.target.toLocaleString();

    html += `
      <div style="background:var(--white);border:1px solid ${done ? 'var(--green)' : 'var(--border)'};border-radius:var(--radius-sm);padding:10px 14px;${done ? 'background:var(--green-light)' : ''}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:16px">${m.icon}</span>
            <span style="font-size:12px;font-weight:600;color:var(--text)">${m.label}</span>
          </div>
          <span style="font-size:10px;font-family:'DM Mono',monospace;color:${done ? 'var(--green)' : 'var(--text3)'}">${done ? '✓ Done' : valDisp + ' / ' + tgtDisp}</span>
        </div>
        <div class="heat-progress-wrap">
          <div class="heat-progress-bar" style="width:${pct}%;background:${done ? 'var(--green)' : 'linear-gradient(90deg,var(--accent-dark),var(--accent2))'}"></div>
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('panel-content').innerHTML = html;
}

function updateUI(hps) {
  const cpc = calcCPC();

  document.getElementById('heat-num').textContent  = fmtFull(G.heat);
  document.getElementById('heat-num').className    = G.goldenMult > 1 ? 'boosted' : '';
  document.getElementById('hps-val').textContent   = fmt(hps * G.goldenMult);
  document.getElementById('hpc-val').textContent   = fmt(cpc * G.goldenMult);
  document.getElementById('h-total').textContent   = fmt(G.totalHeat);
  document.getElementById('h-hps').textContent     = fmt(hps) + '/s';
  document.getElementById('h-clicks').textContent  = G.clicks.toLocaleString();
  document.getElementById('h-time').textContent    = fmtTime(G.timePlayed);
  document.getElementById('p-level').textContent   = G.prestige;
  document.getElementById('p-bonus').textContent   = G.prestige * 10;

  // Radiator glow level
  const svg = document.getElementById('radiator-svg');
  svg.classList.remove('warm', 'hot', 'blazing');
  if      (hps > 1e6)   svg.classList.add('blazing');
  else if (hps > 10000) svg.classList.add('hot');
  else if (hps > 100)   svg.classList.add('warm');

  // Prestige button
  const pBtn = document.getElementById('prestige-btn');
  if (G.totalHeat >= 1e12) pBtn.classList.add('show');
  else                     pBtn.classList.remove('show');

  // Upgrade badge
  if (currentTab === 'upgrades') {
    const affordable = UPGRADES.filter(u => !G.upgrades.includes(u.id) && u.req() && G.heat >= upgCost(u)).length;
    const badge = document.getElementById('badge-upg');
    if (affordable > 0) { badge.textContent = affordable; badge.classList.add('show'); }
    else                  badge.classList.remove('show');
  }
}

// ════════════════════════════════════════════════════════
//  FLAVOUR / MILESTONE MESSAGES
// ════════════════════════════════════════════════════════
let lastFlavourThreshold = 0;

function updateFlavour() {
  let msg = 'The radiator sits quietly. Waiting.';
  for (const [threshold, text] of FLAVOURS) {
    if (G.totalHeat >= threshold) msg = text;
  }
  const el = document.getElementById('flavour');
  if (el.textContent !== msg && !el.classList.contains('flash')) {
    el.textContent = msg;
  }
}

function flashFlavour(text) {
  const el = document.getElementById('flavour');
  el.textContent = text;
  el.classList.add('flash');
  setTimeout(() => {
    el.classList.remove('flash');
    updateFlavour();
  }, 3500);
}

// ════════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  if      (currentTab === 'upgrades')     renderUpgrades();
  else if (currentTab === 'achievements') renderAchievements();
  else if (currentTab === 'milestones')   renderMilestones();
  else if (currentTab === 'stats')        renderStats();
}

// ════════════════════════════════════════════════════════
//  TOOLTIP
// ════════════════════════════════════════════════════════
function showTT(e, d) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent   = d.name   || '';
  document.getElementById('tt-cost').textContent   = d.cost   ? '🔥 ' + d.cost : '';
  document.getElementById('tt-body').textContent   = d.body   || '';
  document.getElementById('tt-effect').textContent = d.effect || '';
  tt.classList.add('show');
  moveTT(e);
}

function hideTT() {
  document.getElementById('tooltip').classList.remove('show');
}

function moveTT(e) {
  const tt = document.getElementById('tooltip');
  const x  = Math.min(e.clientX + 14, window.innerWidth  - tt.offsetWidth  - 10);
  const y  = Math.min(e.clientY + 14, window.innerHeight - tt.offsetHeight - 10);
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className   = 'toast ' + type;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3300);
}

// ════════════════════════════════════════════════════════
//  GOLDEN RADIATOR
// ════════════════════════════════════════════════════════
function spawnGolden() {
  if (goldenVisible) return;
  goldenCooldown = Math.max(45, 160 - G.goldenClicks * 4);
  goldenVisible  = true;
  const el = document.getElementById('golden');
  el.style.left      = (70 + Math.random() * (window.innerWidth  - 180)) + 'px';
  el.style.top       = (80 + Math.random() * (window.innerHeight - 220)) + 'px';
  el.style.display   = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'goldenBob 7s ease-in-out forwards';
  setTimeout(() => { el.style.display = 'none'; goldenVisible = false; }, 7000);
}

function clickGolden() {
  document.getElementById('golden').style.display = 'none';
  goldenVisible = false;
  G.goldenClicks++;

  const hps   = calcHPS();
  const bonus = Math.max(13, hps * 777);
  G.heat      += bonus;
  G.totalHeat += bonus;
  G.goldenMult  = 7;
  G.goldenTimer = 77;

  document.getElementById('golden-banner').classList.add('show');
  toast(`✨ Golden Radiator! +${fmt(bonus)} heat & ×7 for 77 seconds!`, 'gold');
  flashFlavour('✨ The golden tug! Maximum warmth achieved!');
}

// ════════════════════════════════════════════════════════
//  PRESTIGE
// ════════════════════════════════════════════════════════
function prestige() {
  if (G.totalHeat < 1e12) return;
  if (!confirm(
    'Ascend the Heat?\n\n' +
    '• All buildings and upgrades reset\n' +
    '• Heat resets to 0\n' +
    '• You gain a permanent +10% production bonus\n\n' +
    'Current prestige level: ' + G.prestige + '\n' +
    'After prestige bonus: +' + ((G.prestige + 1) * 10) + '%\n\n' +
    'This cannot be undone. Carry on, mush?'
  )) return;

  G.prestige++;
  G.heat          = 0;
  G.totalHeat     = 0;
  G.b             = { valve:0, pipe:0, thermostat:0, boiler:0, furnace:0, district:0, geothermal:0, nuclear:0, solar:0, dyson:0, quantum:0, singularity:0 };
  G.upgrades      = [];
  G.upgradesBought = 0;

  toast(`✦ Prestige ${G.prestige}! All production +${G.prestige * 10}%`, 'purple');
  flashFlavour(`✦ Ascended. Prestige level ${G.prestige}. The heat remembers.`);
  renderTab();
  renderBuildings();
}

// ════════════════════════════════════════════════════════
//  SAVE / LOAD / RESET / EXPORT
// ════════════════════════════════════════════════════════
function saveGame(silent = false) {
  localStorage.setItem('rc4_save', JSON.stringify(G));
  if (!silent) toast('💾 Game saved!');
}

function loadGame() {
  try {
    const raw = localStorage.getItem('rc4_save');
    if (!raw) return;
    const s = JSON.parse(raw);
    Object.assign(G, s);
    BUILDINGS.forEach(b => { if (G.b[b.id] == null) G.b[b.id] = 0; });
    if (!Array.isArray(G.upgrades))     G.upgrades     = [];
    if (!Array.isArray(G.achievements)) G.achievements = [];
    if (!G.bestCombo)    G.bestCombo    = 0;
    if (!G.idleHeat)     G.idleHeat     = 0;
    if (!G.idleTimer)    G.idleTimer    = 0;
    if (!G.goldenTimer)  G.goldenTimer  = 0;
    if (!G.goldenMult)   G.goldenMult   = 1;
  } catch(e) {
    console.error('Save load error:', e);
  }
}

function resetGame() {
  if (!confirm('Reset ALL progress?\n\nThis cannot be undone.')) return;
  localStorage.removeItem('rc4_save');
  localStorage.removeItem('rc4_close');
  location.reload(); 
}

function exportSave() {
  const data = btoa(JSON.stringify(G));
  const blob = new Blob([data], { type: 'text/plain' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'radiator_save.txt';
  a.click();
  toast('📤 Save exported!');
}

// ════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's') saveGame();
  if (e.key === '1') switchTab('upgrades');
  if (e.key === '2') switchTab('achievements');
  if (e.key === '3') switchTab('milestones');
  if (e.key === '4') switchTab('stats');
  if (e.key === 'q') setBulk(1);
  if (e.key === 'w') setBulk(10);
  if (e.key === 'e') setBulk(100);
  if (e.key === 'r') setBulk(0);
});

// ════════════════════════════════════════════════════════
//  OFFLINE EARNINGS
// ════════════════════════════════════════════════════════
loadGame();

const lastClose = localStorage.getItem('rc4_close');
if (lastClose) {
  const offlineSec = Math.min((Date.now() - parseInt(lastClose)) / 1000, 3600);
  const hps        = calcHPS();
  if (offlineSec > 10 && hps > 0) {
    const earned = hps * offlineSec * 0.5;
    G.heat       += earned;
    G.totalHeat  += earned;
    setTimeout(() => toast(`🌙 Away for ${fmtTime(offlineSec)} — +${fmt(earned)} heat while you were gone!`), 600);
  }
}

window.addEventListener('beforeunload', () => {
  localStorage.setItem('rc4_close', Date.now().toString());
  saveGame(true);
});

// ════════════════════════════════════════════════════════
//  TICKER SETUP
// ════════════════════════════════════════════════════════
document.getElementById('ticker-text').textContent =
  TICKER.map(t => '★ ' + t).join('   ');

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
renderBuildings();
renderTab();
goldenCooldown = 130;

</script>
