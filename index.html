<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiator Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --bg2: #eceae4;
  --bg3: #e2e0d8;
  --white: #ffffff;
  --border: #d8d5cc;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #9c9a94;
  --accent: #e85d26;
  --accent-light: #fff0ea;
  --accent-dark: #c04a1a;
  --green: #2d7a4a;
  --green-light: #eaf4ee;
  --gold: #b8860b;
  --gold-light: #fdf6e3;
  --rad-white: #f8f8f6;
  --rad-gray: #c8c6c0;
  --rad-shadow: rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── LAYOUT ── */
#app {
  display: grid;
  grid-template-columns: 320px 1fr 280px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  gap: 0;
}

/* ── HEADER ── */
header {
  grid-column: 1 / -1;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  z-index: 10;
}
.logo {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
}
.header-stats {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 24px;
}
.h-stat { text-align: right; }
.h-stat-val { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }
.h-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.header-btns { display: flex; gap: 6px; margin-left: 16px; }
.hbtn {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.hbtn:hover { background: var(--bg2); border-color: var(--text3); color: var(--text); }

/* ── LEFT PANEL ── */
#left {
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 20px;
  gap: 20px;
  overflow: hidden;
}

#heat-display {
  text-align: center;
  width: 100%;
}
#heat-num {
  font-size: 36px;
  font-weight: 300;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}
#heat-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-top: 4px;
}
#heat-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
  display: flex;
  justify-content: center;
  gap: 16px;
}
#heat-sub span { color: var(--accent); font-weight: 500; }

/* ── RADIATOR CLICK AREA ── */
#rad-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  cursor: pointer;
  position: relative;
  border-radius: var(--radius);
  background: var(--bg);
  transition: background 0.2s;
  user-select: none;
}
#rad-area:hover { background: var(--bg2); }
#rad-area:active { background: var(--bg3); }

/* White radiator SVG */
#radiator-svg {
  width: 160px;
  height: 200px;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12)) drop-shadow(0 2px 6px rgba(0,0,0,0.08));
  transition: transform 0.1s ease, filter 0.3s;
}
#rad-area:active #radiator-svg {
  transform: scale(0.97) translateY(2px);
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
}
#radiator-svg.hot {
  filter: drop-shadow(0 8px 24px rgba(232,93,38,0.2)) drop-shadow(0 2px 6px rgba(0,0,0,0.08));
}

#click-hint {
  position: absolute;
  bottom: 12px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

/* Float text */
.float-text {
  position: fixed;
  pointer-events: none;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--accent);
  animation: floatUp 1s ease-out forwards;
  z-index: 9999;
  white-space: nowrap;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}

/* ── MID PANEL ── */
#mid {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.panel-tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  gap: 0;
  flex-shrink: 0;
}
.ptab {
  padding: 16px 16px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
  position: relative;
}
.ptab:hover { color: var(--text); }
.ptab.active { color: var(--text); border-bottom-color: var(--accent); }
.ptab .badge {
  position: absolute;
  top: 8px; right: 4px;
  background: var(--accent);
  color: white;
  font-size: 9px;
  min-width: 14px;
  height: 14px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
  font-family: 'DM Mono', monospace;
}

#panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#panel-content::-webkit-scrollbar { width: 4px; }
#panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── UPGRADES ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 10px;
  margin-top: 20px;
}
.section-label:first-child { margin-top: 0; }

.upgrade-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  margin-bottom: 8px;
}

.upgrade-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  position: relative;
}
.upgrade-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.upgrade-card.affordable { border-color: var(--accent); background: var(--accent-light); }
.upgrade-card.affordable:hover { box-shadow: 0 4px 16px rgba(232,93,38,0.15); }
.upgrade-card.bought { opacity: 0.45; cursor: default; }
.upgrade-card.bought:hover { transform: none; border-color: var(--border); box-shadow: none; }
.upgrade-card.cant-afford { opacity: 0.6; }

.ug-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
.ug-body { flex: 1; min-width: 0; }
.ug-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.ug-effect { font-size: 11px; color: var(--text2); line-height: 1.4; }
.ug-cost {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 500;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.ug-cost.cant { color: var(--text3); }
.ug-bought-tag {
  font-size: 10px;
  color: var(--green);
  background: var(--green-light);
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 6px;
  display: inline-block;
  font-weight: 500;
}

/* ── ACHIEVEMENTS ── */
.ach-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.ach-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
}
.ach-card.earned { border-color: var(--gold); background: var(--gold-light); }
.ach-card.locked { opacity: 0.4; filter: grayscale(0.5); }
.ach-icon { font-size: 22px; flex-shrink: 0; }
.ach-body {}
.ach-name { font-size: 12px; font-weight: 600; color: var(--text); }
.ach-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
}
.stat-card-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
}
.stat-row + .stat-row { border-top: 1px solid var(--bg2); }
.s-label { color: var(--text2); }
.s-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text); font-weight: 500; }

/* ── RIGHT PANEL — BUILDINGS ── */
#right {
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.right-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }

.bulk-row {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bulk-btn {
  flex: 1;
  padding: 4px 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.bulk-btn:hover { background: var(--bg2); color: var(--text); }
.bulk-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

#buildings-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#buildings-list::-webkit-scrollbar { width: 3px; }
#buildings-list::-webkit-scrollbar-thumb { background: var(--border); }

.building-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--bg2);
  gap: 10px;
  position: relative;
}
.building-row:hover { background: var(--bg); }
.building-row.affordable:hover { background: var(--accent-light); }
.building-row.locked { opacity: 0.35; pointer-events: none; }

.b-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.b-info { flex: 1; min-width: 0; }
.b-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.b-hps { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }
.b-right { text-align: right; flex-shrink: 0; }
.b-cost-tag {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  font-weight: 500;
}
.b-cost-tag.cant { color: var(--text3); }
.b-owned-num {
  font-size: 20px;
  font-weight: 300;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  line-height: 1;
}
.b-owned-num.has { color: var(--text); font-weight: 500; }

/* ── GOLDEN RADIATOR ── */
#golden {
  position: fixed;
  cursor: pointer;
  z-index: 500;
  display: none;
  font-size: 36px;
  animation: goldenBob 6s ease-in-out;
  filter: drop-shadow(0 0 16px rgba(255, 200, 50, 0.7));
}
@keyframes goldenBob {
  0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
  10% { opacity: 1; transform: scale(1.1) rotate(3deg); }
  90% { opacity: 1; transform: scale(1) rotate(-2deg); }
  100% { opacity: 0; transform: scale(0.8) rotate(5deg); }
}

/* ── TOAST ── */
#toasts {
  position: fixed;
  top: 70px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9000;
  pointer-events: none;
}
.toast {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  box-shadow: var(--shadow-md);
  animation: toastIn 0.25s ease, toastOut 0.25s ease 2.75s forwards;
  min-width: 220px;
  max-width: 320px;
}
.toast.gold { border-left-color: var(--gold); }
.toast.green { border-left-color: var(--green); }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  max-width: 240px;
  pointer-events: none;
  z-index: 10000;
  display: none;
  box-shadow: var(--shadow-lg);
}
#tooltip.show { display: block; }
.tt-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.tt-cost { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); margin-bottom: 6px; font-weight: 500; }
.tt-body { font-size: 11px; color: var(--text2); line-height: 1.5; }
.tt-effect { font-size: 11px; color: var(--green); margin-top: 6px; font-weight: 500; }

/* ── PRESTIGE ── */
#prestige-wrap {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#prestige-btn {
  width: 100%;
  padding: 8px;
  background: linear-gradient(135deg, #f8f0ff, #f0e8ff);
  border: 1px solid #c8a0ee;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: #7030b0;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  display: none;
}
#prestige-btn:hover { background: linear-gradient(135deg, #ede0ff, #e4d0ff); box-shadow: 0 2px 12px rgba(140, 60, 220, 0.2); }
#prestige-btn.show { display: block; }
#prestige-info { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 6px; text-align: center; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 1.6; }

</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      Radiator Clicker
    </div>
    <div class="header-stats">
      <div class="h-stat">
        <div class="h-stat-val" id="h-total">0</div>
        <div class="h-stat-label">Total Heat</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" id="h-hps">0/s</div>
        <div class="h-stat-label">Heat/sec</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-val" id="h-time">0s</div>
        <div class="h-stat-label">Time Played</div>
      </div>
    </div>
    <div class="header-btns">
      <button class="hbtn" onclick="saveGame()">Save</button>
      <button class="hbtn" onclick="resetGame()">Reset</button>
    </div>
  </header>

  <!-- LEFT -->
  <div id="left">
    <div id="heat-display">
      <div id="heat-num">0</div>
      <div id="heat-label">Thermal Units</div>
      <div id="heat-sub">
        <span id="hps-val">0</span>/s &nbsp; <span id="hpc-val">1</span>/click
      </div>
    </div>

    <div id="rad-area" onclick="clickRadiator(event)">
      <svg id="radiator-svg" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="finGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e8e6e0"/>
            <stop offset="35%" stop-color="#f8f8f6"/>
            <stop offset="65%" stop-color="#f8f8f6"/>
            <stop offset="100%" stop-color="#d8d6d0"/>
          </linearGradient>
          <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f0eeea"/>
            <stop offset="50%" stop-color="#e0dedd"/>
            <stop offset="100%" stop-color="#d0cec8"/>
          </linearGradient>
          <linearGradient id="heatGlow" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
          </linearGradient>
          <filter id="finShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.1"/>
          </filter>
        </defs>

        <!-- Top header pipe -->
        <rect x="8" y="10" width="144" height="14" rx="7" fill="url(#pipeGrad)" stroke="#ccc9c0" stroke-width="0.8"/>
        <rect x="16" y="14" width="128" height="6" rx="3" fill="#e8e6e0"/>
        <!-- valve -->
        <circle cx="80" cy="5" r="5" fill="#e0deda" stroke="#c8c5bc" stroke-width="0.8"/>
        <rect x="77" y="3" width="6" height="14" rx="2" fill="#d8d5cc" stroke="#c0bdb4" stroke-width="0.5"/>

        <!-- Fins — 7 fins -->
        <g filter="url(#finShadow)">
          <!-- fin 1 -->
          <rect x="10" y="24" width="16" height="140" rx="3" fill="url(#finGrad)" stroke="#d0cec8" stroke-width="0.6"/>
          <rect x="12" y="28" width="12" height="132" rx="2" fill="#f0eeea"/>
          <line x1="13" y1="32" x2="13" y2="152" stroke="#e0deda" stroke-width="1"/>
          <line x1="22" y1="32" x2="22" y2="152" stroke="#e0deda" stroke-width="1"/>
          <!-- fin 2 -->
          <rect x="32" y="24" width="16" height="140" rx="3" fill="url(#finGrad)" stroke="#d0cec8" stroke-width="0.6"/>
          <rect x="34" y="28" width="12" height="132" rx="2" fill="#f0eeea"/>
          <line x1="35" y1="32" x2="35" y2="152" stroke="#e0deda" stroke-width="1"/>
          <line x1="44" y1="32" x2="44" y2="152" stroke="#e0deda" stroke-width="1"/>
          <!-- fin 3 -->
          <rect x="54" y="24" width="16" height="140" rx="3" fill="url(#finGrad)" stroke="#d0cec8" stroke-width="0.6"/>
          <rect x="56" y="28" width="12" height="132" rx="2" fill="#f0eeea"/>
          <line x1="57" y1="32" x2="57" y2="152" stroke="#e0deda" stroke-width="1"/>
          <line x1="66" y1="32" x2="66" y2="152" stroke="#e0deda" stroke-width="1"/>
          <!-- fin 4 center -->
          <rect x="72" y="24" width="16" height="140" rx="3" fill="url(#finGrad)" stroke="#d0cec8" stroke-width="0.6"/>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════

let G = {
  heat: 0,
  totalHeat: 0,
  clicks: 0,
  upgradesBought: 0,
  goldenClicks: 0,
  prestige: 0,
  b: { valve:0, pipe:0, thermostat:0, boiler:0, furnace:0, district:0, geothermal:0, nuclear:0, solar:0, dyson:0, quantum:0 },
  upgrades: [],    // bought upgrade ids
  achievements: [],
  highHPS: 0,
  timePlayed: 0,
  bulkBuy: 1,
  goldenMult: 1,
  goldenTimer: 0,
};

let currentTab = 'upgrades';
let lastTick = Date.now();
let goldenCooldown = 0;

// ═══════════════════════════════════════════
// MATH
// ═══════════════════════════════════════════

function calcHPS() {
  let globalMult = 1;
  const bMults = {};
  BUILDINGS.forEach(b => bMults[b.id] = 1);

  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (!u) return;
    if (u.type === 'global') globalMult *= u.mult;
    if (u.type === 'building') bMults[u.target] = (bMults[u.target] || 1) * u.mult;
  });

  let hps = 0;
  BUILDINGS.forEach(b => {
    hps += (G.b[b.id] || 0) * b.baseHPS * bMults[b.id];
  });

  return hps * globalMult * (1 + G.prestige * 0.1);
}

function calcCPC() {
  let cp = 1;
  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (u && u.type === 'click') cp *= u.mult;
  });
  cp += calcHPS() * 0.01;
  cp *= (1 + G.prestige * 0.05);
  return Math.max(1, cp);
}

function buildingCost(b, count, owned) {
  let t = 0;
  for (let i = 0; i < count; i++) t += Math.ceil(b.baseCost * Math.pow(1.15, owned + i));
  return t;
}

function maxBuyable(b) {
  let n = 0, total = 0, owned = G.b[b.id] || 0;
  while (true) {
    const next = Math.ceil(b.baseCost * Math.pow(1.15, owned + n));
    if (total + next > G.heat) break;
    total += next;
    n++;
    if (n > 5000) break;
  }
  return n;
}

function totalB() { return Object.values(G.b).reduce((a, x) => a + x, 0); }

// ═══════════════════════════════════════════
// FORMAT
// ═══════════════════════════════════════════

function fmt(n) {
  if (n < 1000) return Math.floor(n).toLocaleString();
  const suf = ['','k','M','B','T','Qa','Qi','Sx','Sp','Oc'];
  const t = Math.min(Math.floor(Math.log10(n) / 3), suf.length - 1);
  const s = n / Math.pow(1000, t);
  return (s >= 100 ? s.toFixed(1) : s >= 10 ? s.toFixed(2) : s.toFixed(3)).replace(/\.?0+$/, '') + suf[t];
}

function fmtFull(n) {
  if (n < 1e6) return Math.floor(n).toLocaleString();
  return fmt(n);
}

function fmtTime(s) {
  s = Math.floor(s);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════

function tick() {
  const now = Date.now();
  const dt = Math.min((now - lastTick) / 1000, 0.5);
  lastTick = now;

  const hps = calcHPS();
  const earn = hps * dt * G.goldenMult;
  G.heat += earn;
  G.totalHeat += earn;
  G.timePlayed += dt;
  if (hps > G.highHPS) G.highHPS = hps;

  if (G.goldenMult > 1) {
    G.goldenTimer -= dt;
    if (G.goldenTimer <= 0) {
      G.goldenMult = 1;
      toast('Golden boost faded.');
    }
  }

  goldenCooldown -= dt;
  if (goldenCooldown <= 0) spawnGolden();

  updateUI(hps);
  checkAchievements();
}

setInterval(tick, 1000 / 30);
setInterval(() => saveGame(true), 30000);

// ═══════════════════════════════════════════
// CLICK
// ═══════════════════════════════════════════

function clickRadiator(e) {
  const cp = calcCPC() * G.goldenMult;
  G.heat += cp;
  G.totalHeat += cp;
  G.clicks++;

  // heat shimmer
  const shimmer = document.getElementById('heat-shimmer');
  shimmer.style.opacity = '1';
  setTimeout(() => shimmer.style.opacity = '0', 300);

  // float text
  const ft = document.createElement('div');
  ft.className = 'float-text';
  ft.textContent = '+' + fmt(cp);
  ft.style.left = (e.clientX - 16) + 'px';
  ft.style.top = (e.clientY - 10) + 'px';
  document.body.appendChild(ft);
  setTimeout(() => ft.remove(), 1000);
}

// ═══════════════════════════════════════════
// BUILDINGS
// ═══════════════════════════════════════════

function buyBuilding(b) {
  let count = G.bulkBuy === 0 ? Math.max(1, maxBuyable(b)) : G.bulkBuy;
  const owned = G.b[b.id] || 0;
  const cost = buildingCost(b, count, owned);
  if (G.heat < cost) {
    // try ×1
    if (count === 1) return;
    const c1 = buildingCost(b, 1, owned);
    if (G.heat < c1) return;
    count = 1;
  }
  const finalCost = buildingCost(b, count, owned);
  if (G.heat < finalCost) return;
  G.heat -= finalCost;
  G.b[b.id] = owned + count;
  renderBuildings();
  if (currentTab === 'upgrades') renderTab();
}

function setBulk(n) {
  G.bulkBuy = n;
  ['b1','b10','b100','bmax'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(n === 0 ? 'bmax' : 'b' + n).classList.add('active');
  renderBuildings();
}

function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  BUILDINGS.forEach(b => {
    const owned = G.b[b.id] || 0;
    const count = G.bulkBuy === 0 ? Math.max(1, maxBuyable(b)) : G.bulkBuy;
    const cost = buildingCost(b, count, owned);
    const canAfford = G.heat >= cost;

    const row = document.createElement('div');
    row.className = 'building-row' + (canAfford ? ' affordable' : '');

    const bHPS = calcBuildingHPS(b);
    const countLabel = G.bulkBuy === 0 ? `×${Math.max(1, maxBuyable(b))}` : (G.bulkBuy > 1 ? `×${G.bulkBuy}` : '');

    row.innerHTML = `
      <div class="b-icon">${b.icon}</div>
      <div class="b-info">
        <div class="b-name">${b.name}</div>
        <div class="b-hps">${owned > 0 ? fmt(bHPS * owned) + '/s' : '—'}</div>
      </div>
      <div class="b-right">
        <div class="b-cost-tag ${canAfford ? '' : 'cant'}">${fmt(cost)} ${countLabel}</div>
        <div class="b-owned-num ${owned > 0 ? 'has' : ''}">${owned}</div>
      </div>
    `;

    row.addEventListener('click', () => buyBuilding(b));
    row.addEventListener('mouseenter', e => showTT(e, {
      name: b.name,
      cost: fmtFull(cost) + ' heat',
      body: b.desc,
      effect: owned > 0 ? `Producing ${fmt(bHPS * owned)}/s total (${fmt(bHPS)}/s each)` : `Each produces ${fmt(bHPS)}/s`,
    }));
    row.addEventListener('mouseleave', hideTT);
    row.addEventListener('mousemove', moveTT);
    list.appendChild(row);
  });
}

function calcBuildingHPS(b) {
  let mult = 1;
  G.upgrades.forEach(uid => {
    const u = UPGRADES.find(x => x.id === uid);
    if (!u) return;
    if (u.type === 'building' && u.target === b.id) mult *= u.mult;
    if (u.type === 'global') mult *= u.mult;
  });
  return b.baseHPS * mult * (1 + G.prestige * 0.1);
}

// ═══════════════════════════════════════════
// UPGRADES
// ═══════════════════════════════════════════

function buyUpgrade(u) {
  if (G.upgrades.includes(u.id)) return;
  if (G.heat < u.cost) return;
  G.heat -= u.cost;
  G.upgrades.push(u.id);
  G.upgradesBought++;
  toast('🔧 ' + u.name + ' purchased!');
  renderTab();
  renderBuildings();
}

function renderUpgrades() {
  const avail = UPGRADES.filter(u => !G.upgrades.includes(u.id) && u.req());
  const bought = UPGRADES.filter(u => G.upgrades.includes(u.id));

  const affordable = avail.filter(u => G.heat >= u.cost).length;
  const badge = document.getElementById('badge-upg');
  if (affordable > 0) { badge.style.display = 'flex'; badge.textContent = affordable; }
  else badge.style.display = 'none';

  let html = '';
  if (avail.length === 0 && bought.length === 0) {
    html = '<div class="empty">Generate more heat to unlock upgrades.</div>';
  } else {
    if (avail.length > 0) {
      html += '<div class="section-label">Available</div><div class="upgrade-grid" id="ug-avail"></div>';
    }
    if (bought.length > 0) {
      html += '<div class="section-label">Purchased</div><div class="upgrade-grid" id="ug-bought"></div>';
    }
  }

  document.getElementById('panel-content').innerHTML = html;

  if (avail.length > 0) {
    const grid = document.getElementById('ug-avail');
    avail.forEach(u => {
      const canAfford = G.heat >= u.cost;
      const card = document.createElement('div');
      card.className = 'upgrade-card' + (canAfford ? ' affordable' : ' cant-afford');
      card.innerHTML = `
        <div class="ug-icon">${u.icon}</div>
        <div class="ug-body">
          <div class="ug-name">${u.name}</div>
          <div class="ug-effect">${u.effect}</div>
          <div class="ug-cost ${canAfford ? '' : 'cant'}">🔥 ${fmtFull(u.cost)}</div>
        </div>
      `;
      card.addEventListener('click', () => buyUpgrade(u));
      card.addEventListener('mouseenter', e => showTT(e, { name: u.name, cost: fmtFull(u.cost) + ' heat', body: u.desc, effect: u.effect }));
      card.addEventListener('mouseleave', hideTT);
      card.addEventListener('mousemove', moveTT);
      grid.appendChild(card);
    });
  }

  if (bought.length > 0) {
    const grid = document.getElementById('ug-bought');
    bought.forEach(u => {
      const card = document.createElement('div');
      card.className = 'upgrade-card bought';
      card.innerHTML = `
        <div class="ug-icon">${u.icon}</div>
        <div class="ug-body">
          <div class="ug-name">${u.name}</div>
          <div class="ug-effect">${u.effect}</div>
          <div class="ug-bought-tag">✓ Purchased</div>
        </div>
      `;
      card.addEventListener('mouseenter', e => showTT(e, { name: u.name + ' ✓', cost: 'Purchased', body: u.desc, effect: u.effect }));
      card.addEventListener('mouseleave', hideTT);
      card.addEventListener('mousemove', moveTT);
      grid.appendChild(card);
    });
  }
}

// ═══════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievements.includes(a.id) && a.req()) {
      G.achievements.push(a.id);
      toast('🏆 Achievement: ' + a.name, 'green');
      if (currentTab === 'achievements') renderTab();
    }
  });
}

function renderAchievements() {
  const earned = G.achievements.length;
  const total = ACHIEVEMENTS.length;

  const badge = document.getElementById('badge-ach');
  badge.style.display = 'none';

  let html = `<div class="section-label">${earned} / ${total} Unlocked</div><div class="ach-grid">`;
  ACHIEVEMENTS.forEach(a => {
    const isEarned = G.achievements.includes(a.id);
    html += `
      <div class="ach-card ${isEarned ? 'earned' : 'locked'}">
        <div class="ach-icon">${a.icon}</div>
        <div class="ach-body">
          <div class="ach-name">${a.name}</div>
          <div class="ach-desc">${isEarned ? a.desc : '???'}</div>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('panel-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════

function renderStats() {
  const hps = calcHPS();
  const cpc = calcCPC();
  document.getElementById('panel-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Production</div>
        <div class="stat-row"><span class="s-label">Heat/second</span><span class="s-val">${fmt(hps)}</span></div>
        <div class="stat-row"><span class="s-label">Heat/click</span><span class="s-val">${fmt(cpc)}</span></div>
        <div class="stat-row"><span class="s-label">Best HPS</span><span class="s-val">${fmt(G.highHPS)}</span></div>
        <div class="stat-row"><span class="s-label">Golden mult</span><span class="s-val">×${G.goldenMult}${G.goldenMult>1?' ('+Math.ceil(G.goldenTimer)+'s)':''}</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">All Time</div>
        <div class="stat-row"><span class="s-label">Total heat</span><span class="s-val">${fmt(G.totalHeat)}</span></div>
        <div class="stat-row"><span class="s-label">Total clicks</span><span class="s-val">${G.clicks.toLocaleString()}</span></div>
        <div class="stat-row"><span class="s-label">Upgrades</span><span class="s-val">${G.upgradesBought}</span></div>
        <div class="stat-row"><span class="s-label">Golden clicks</span><span class="s-val">${G.goldenClicks}</span></div>
      </div>
      <div class="stat-card" style="grid-column:1/-1">
        <div class="stat-card-title">Buildings</div>
        ${BUILDINGS.map(b => `<div class="stat-row"><span class="s-label">${b.icon} ${b.name}</span><span class="s-val">${G.b[b.id]||0} · ${fmt(calcBuildingHPS(b)*(G.b[b.id]||0))}/s</span></div>`).join('')}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Progress</div>
        <div class="stat-row"><span class="s-label">Achievements</span><span class="s-val">${G.achievements.length}/${ACHIEVEMENTS.length}</span></div>
        <div class="stat-row"><span class="s-label">Prestige level</span><span class="s-val">${G.prestige}</span></div>
        <div class="stat-row"><span class="s-label">Prestige bonus</span><span class="s-val">+${G.prestige*10}%</span></div>
        <div class="stat-row"><span class="s-label">Time played</span><span class="s-val">${fmtTime(G.timePlayed)}</span></div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════

function updateUI(hps) {
  const cpc = calcCPC();
  document.getElementById('heat-num').textContent = fmtFull(G.heat);
  document.getElementById('hps-val').textContent = fmt(hps * G.goldenMult);
  document.getElementById('hpc-val').textContent = fmt(cpc * G.goldenMult);
  document.getElementById('h-total').textContent = fmt(G.totalHeat);
  document.getElementById('h-hps').textContent = fmt(hps) + '/s';
  document.getElementById('h-time').textContent = fmtTime(G.timePlayed);

  document.getElementById('p-level').textContent = G.prestige;
  document.getElementById('p-bonus').textContent = G.prestige * 10;

  const pBtn = document.getElementById('prestige-btn');
  if (G.totalHeat >= 1e12) pBtn.classList.add('show');
  else pBtn.classList.remove('show');

  // Hot glow on radiator
  if (hps > 50) document.getElementById('radiator-svg').classList.add('hot');
  else document.getElementById('radiator-svg').classList.remove('hot');

  if (currentTab === 'upgrades') {
    // just update badge without full re-render for perf
    const affordable = UPGRADES.filter(u => !G.upgrades.includes(u.id) && u.req() && G.heat >= u.cost).length;
    const badge = document.getElementById('badge-upg');
    if (affordable > 0) { badge.style.display = 'flex'; badge.textContent = affordable; }
    else badge.style.display = 'none';
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderTab();
}

function renderTab() {
  if (currentTab === 'upgrades') renderUpgrades();
  else if (currentTab === 'achievements') renderAchievements();
  else if (currentTab === 'stats') renderStats();
}

// ═══════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════

function showTT(e, d) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-cost').textContent = d.cost ? '🔥 ' + d.cost : '';
  document.getElementById('tt-body').textContent = d.body || '';
  document.getElementById('tt-effect').textContent = d.effect || '';
  tt.classList.add('show');
  moveTT(e);
}
function hideTT() { document.getElementById('tooltip').classList.remove('show'); }
function moveTT(e) {
  const tt = document.getElementById('tooltip');
  const x = Math.min(e.clientX + 14, window.innerWidth - tt.offsetWidth - 8);
  const y = Math.min(e.clientY + 14, window.innerHeight - tt.offsetHeight - 8);
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════

function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const d = document.createElement('div');
  d.className = 'toast ' + type;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3200);
}

// ═══════════════════════════════════════════
// GOLDEN
// ═══════════════════════════════════════════

let goldenVisible = false;
function spawnGolden() {
  if (goldenVisible) return;
  const interval = Math.max(30, 150 - G.goldenClicks * 3);
  goldenCooldown = interval;
  goldenVisible = true;
  const el = document.getElementById('golden');
  el.style.left = (60 + Math.random() * (window.innerWidth - 160)) + 'px';
  el.style.top = (80 + Math.random() * (window.innerHeight - 200)) + 'px';
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'goldenBob 6s ease-in-out forwards';
  setTimeout(() => { el.style.display = 'none'; goldenVisible = false; }, 6000);
}

function clickGolden() {
  const el = document.getElementById('golden');
  el.style.display = 'none';
  goldenVisible = false;
  G.goldenClicks++;
  const bonus = Math.max(13, calcHPS() * 777);
  G.heat += bonus;
  G.totalHeat += bonus;
  G.goldenMult = 7;
  G.goldenTimer = 77;
  toast('✨ Golden Radiator! +' + fmt(bonus) + ' heat & ×7 for 77s!', 'gold');
}

// ═══════════════════════════════════════════
// PRESTIGE
// ═══════════════════════════════════════════

function prestige() {
  if (G.totalHeat < 1e12) return;
  if (!confirm('Ascend the Heat?\n\nAll buildings and upgrades reset.\nYou gain a permanent +10% bonus per prestige level.\n\nThis cannot be undone.')) return;
  G.prestige++;
  G.heat = 0;
  G.totalHeat = 0;
  G.b = { valve:0, pipe:0, thermostat:0, boiler:0, furnace:0, district:0, geothermal:0, nuclear:0, solar:0, dyson:0, quantum:0 };
  G.upgrades = [];
  G.upgradesBought = 0;
  toast('✦ Prestige ' + G.prestige + '! All production +' + (G.prestige*10) + '%', 'gold');
  renderTab();
  renderBuildings();
}

// ═══════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════

function saveGame(silent = false) {
  localStorage.setItem('rc2_save', JSON.stringify(G));
  if (!silent) toast('💾 Saved!');
}

function loadGame() {
  try {
    const d = localStorage.getItem('rc2_save');
    if (!d) return;
    const s = JSON.parse(d);
    Object.assign(G, s);
    // ensure all building keys exist
    BUILDINGS.forEach(b => { if (G.b[b.id] == null) G.b[b.id] = 0; });
    if (!Array.isArray(G.upgrades)) G.upgrades = [];
    if (!Array.isArray(G.achievements)) G.achievements = [];
  } catch(e) { console.error(e); }
}

function resetGame() {
  if (!confirm('Reset ALL progress? This cannot be undone.')) return;
  localStorage.removeItem('rc2_save');
  location.reload();
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's') saveGame();
  if (e.key === '1') switchTab('upgrades');
  if (e.key === '2') switchTab('achievements');
  if (e.key === '3') switchTab('stats');
  if (e.key === 'q') setBulk(1);
  if (e.key === 'w') setBulk(10);
  if (e.key === 'e') setBulk(100);
  if (e.key === 'r') setBulk(0);
});

// ═══════════════════════════════════════════
// OFFLINE EARNINGS
// ═══════════════════════════════════════════

loadGame();

const lastClose = localStorage.getItem('rc2_close');
if (lastClose) {
  const offlineSec = Math.min((Date.now() - parseInt(lastClose)) / 1000, 3600);
  const hps = calcHPS();
  if (offlineSec > 10 && hps > 0) {
    const earned = hps * offlineSec * 0.5;
    G.heat += earned;
    G.totalHeat += earned;
    setTimeout(() => toast('🌙 Away for ' + fmtTime(offlineSec) + ' — +' + fmt(earned) + ' heat!'), 500);
  }
}

window.addEventListener('beforeunload', () => {
  localStorage.setItem('rc2_close', Date.now());
  saveGame(true);
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

renderBuildings();
renderTab();
goldenCooldown = 90;

</script>
</body>
</html>
